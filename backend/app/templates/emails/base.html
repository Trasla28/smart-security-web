<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block subject %}Notificación{% endblock %}</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 32px auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .header { background: #1a2c4e; padding: 24px 32px; }
    .header h1 { color: #ffffff; margin: 0; font-size: 20px; }
    .header p { color: #a0b0c8; margin: 4px 0 0; font-size: 13px; }
    .body { padding: 32px; color: #333333; line-height: 1.6; }
    .body h2 { font-size: 18px; margin: 0 0 16px; color: #1a2c4e; }
    .body p { margin: 0 0 12px; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
    .badge-open { background: #dbeafe; color: #1d4ed8; }
    .badge-warning { background: #fef9c3; color: #854d0e; }
    .badge-danger { background: #fee2e2; color: #991b1b; }
    .badge-success { background: #dcfce7; color: #166534; }
    .btn { display: inline-block; margin-top: 20px; padding: 12px 24px; background: #1a2c4e; color: #ffffff; text-decoration: none; border-radius: 6px; font-size: 14px; }
    .footer { background: #f8f9fa; padding: 16px 32px; text-align: center; font-size: 12px; color: #888888; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Smart Security — Tickets</h1>
      <p>Sistema interno de gestión de solicitudes</p>
    </div>
    <div class="body">
      {% block content %}{% endblock %}
    </div>
    <div class="footer">
      Este mensaje fue generado automáticamente. Por favor no respondas a este correo.
    </div>
  </div>
</body>
</html>
